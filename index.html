<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Single Page Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color: #333;
            text-align: center;
        }
        header {
            background-color: #005A9C;
            color: white;
            padding: 20px 0;
        }
        main {
            padding: 50px 20px;
        }
        footer {
            margin-top: 50px;
            font-size: 0.8em;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <main>
        <h2>Hello, World!</h2>
        <p>This is a completely functional single-page website built with just HTML and a little CSS.</p>
        <p>You can add more text, images, or links right here.</p>
    </main>

    <footer>
        <p>&copy; 2026 My Awesome Site</p>
    </footer>

</body>
</html>
